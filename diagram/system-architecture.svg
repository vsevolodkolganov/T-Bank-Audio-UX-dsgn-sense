<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <style>
    .bg { fill:#0b0b0b }
    .title { fill:#ffffff; font-size:34px; font-weight:700 }
    .box { fill:#111111; stroke:#FFDD2D; stroke-width:2; rx:14 }
    .text { fill:#ffffff; font-size:18px }
    .sub { fill:#cccccc; font-size:14px }
    .arrow { stroke:#FFDD2D; stroke-width:3; marker-end:url(#arrow) }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#FFDD2D"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="500"/>

  <text x="60" y="70" class="title">T-Bot System Architecture</text>

  <!-- User -->
  <rect x="60" y="200" width="200" height="100" class="box"/>
  <text x="95" y="245" class="text">👤 Пользователь</text>
  <text x="95" y="270" class="sub">голосовая команда</text>

  <!-- Headphones -->
  <rect x="320" y="200" width="220" height="100" class="box"/>
  <text x="360" y="245" class="text">🎧 Наушники</text>
  <text x="350" y="270" class="sub">микрофон + аудио</text>

  <!-- Voice AI -->
  <rect x="600" y="200" width="220" height="100" class="box"/>
  <text x="655" y="245" class="text">🤖 Voice AI</text>
  <text x="630" y="270" class="sub">VAD • NLU • Dialog</text>

  <!-- Bank -->
  <rect x="880" y="200" width="240" height="100" class="box"/>
  <text x="950" y="245" class="text">🏦 T-Bank API</text>
  <text x="930" y="270" class="sub">payments • accounts</text>

  <!-- Arrows -->
  <line x1="260" y1="250" x2="320" y2="250" class="arrow"/>
  <line x1="540" y1="250" x2="600" y2="250" class="arrow"/>
  <line x1="820" y1="250" x2="880" y2="250" class="arrow"/>

  <!-- Audio Engine -->
  <rect x="600" y="360" width="220" height="90" class="box"/>
  <text x="635" y="405" class="text">🔊 Audio Engine</text>
  <text x="620" y="430" class="sub">earcons • haptics</text>

  <line x1="710" y1="300" x2="710" y2="360" class="arrow"/>

</svg>
